name: Release VIR SDK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - name: Check release version
        run: |
          node -e 'const p=require("./package.json"); if ("v" + p.version !== process.env.GITHUB_REF_NAME) process.exit(1)'

      - run: npm run fetch:lean

      - run: npm run install:wasi

      - run: npm run build:sdk-artifact

      - name: Publish durable SDK asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" build/artifacts/lean-vir-sdk.tar.gz --clobber
