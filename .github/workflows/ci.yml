name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:ir-codec-tags
      - run: npm run test:wasm-extensions
      - name: Cache Lean source
        uses: actions/cache@v4
        with:
          path: third_party/lean4-src
          key: ${{ runner.os }}-lean4-src-${{ hashFiles('lean-toolchain', 'scripts/fetch-lean-source.sh') }}
      - name: Cache WASI SDK
        uses: actions/cache@v4
        with:
          path: |
            .tools/cache
            .tools/wasi-sdk-33.0-x86_64-linux
          key: ${{ runner.os }}-${{ runner.arch }}-wasi-sdk-${{ hashFiles('scripts/install-wasi-sdk.sh') }}
      - run: npm run fetch:lean
      - run: npm run install:wasi
      - run: npm run check:boundary-registry
      - run: npm run build:demo:release
      - run: npm run test:upstream:no-build
      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vir-demo-artifacts
          path: |
            web/public/vir-upstream.wasm
            web/public/vir-upstream.dev.wasm
            web/public/*.irpkg
          if-no-files-found: error

  runtime:
    runs-on: ubuntu-latest
    needs: build-demo
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download demo artifacts
        uses: actions/download-artifact@v4
        with:
          name: vir-demo-artifacts
          path: web/public
      - run: npm run test:runtime:pure

  runtime-lean:
    runs-on: ubuntu-latest
    needs: build-demo
    steps:
      - uses: actions/checkout@v5
      - name: Install Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download demo artifacts
        uses: actions/download-artifact@v4
        with:
          name: vir-demo-artifacts
          path: web/public
      - run: npm run test:runtime:lean

  fixtures:
    runs-on: ubuntu-latest
    needs: build-demo
    steps:
      - uses: actions/checkout@v5
      - name: Install Lean
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Download demo artifacts
        uses: actions/download-artifact@v4
        with:
          name: vir-demo-artifacts
          path: web/public
      - run: npm run test:fixtures:no-build
